<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JARVIS AI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060307;--red:#ff1744;--red2:#ff4569;
  --red-glow:rgba(255,23,68,0.4);--white:#fff0f0;
  --muted:rgba(255,240,240,0.4);--border:rgba(255,23,68,0.2);
}
html,body{height:100%}
body{background:var(--bg);color:var(--white);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 80px;overflow-x:hidden;position:relative}
.bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(255,23,68,0.18) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 80% 80%,rgba(255,23,68,0.06) 0%,transparent 50%)}
.grid-layer{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(255,23,68,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,23,68,0.04) 1px,transparent 1px);background-size:44px 44px}
.scanline{position:fixed;inset:0;pointer-events:none;z-index:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px)}
.app{width:100%;max-width:500px;position:relative;z-index:1;padding:20px;display:flex;flex-direction:column;align-items:center}
.topbar{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logo{font-family:'Orbitron',monospace;font-size:12px;font-weight:900;letter-spacing:4px;color:var(--red);text-shadow:0 0 20px var(--red-glow)}
.ver{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,0.2);border:1px solid var(--border);padding:4px 10px;border-radius:4px;letter-spacing:1px}
.wake-status{width:100%;background:rgba(255,23,68,0.05);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px;font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,0.5)}
.wake-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 1.5s ease-in-out infinite}
.wake-dot.off{background:rgba(255,255,255,0.2);animation:none}
@keyframes blink{0%,100%{opacity:0.4}50%{opacity:1;box-shadow:0 0 8px var(--red)}}

/* GESTURE PANEL */
.gesture-panel{width:100%;background:rgba(0,229,255,0.04);border:1px solid rgba(0,229,255,0.15);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;flex-direction:column;gap:8px}
.gesture-header{display:flex;justify-content:space-between;align-items:center}
.gesture-title{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:rgba(0,229,255,0.7)}
.gesture-status{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3)}
.gesture-status.on{color:#00e5ff}
.cam-wrap{position:relative;width:100%;border-radius:8px;overflow:hidden;display:none}
.cam-wrap.show{display:block}
#gestureVideo{width:100%;border-radius:8px;transform:scaleX(-1)}
#gestureOverlay{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.7);border:1px solid rgba(0,229,255,0.4);border-radius:6px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:10px;color:#00e5ff}
.gesture-labels{display:flex;gap:6px;flex-wrap:wrap}
.g-label{font-family:'Space Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4)}
.g-label.active{background:rgba(0,229,255,0.15);border-color:rgba(0,229,255,0.4);color:#00e5ff}

/* TIMER */
.timer-bar{width:100%;background:rgba(255,136,0,0.06);border:1px solid rgba(255,136,0,0.2);border-radius:10px;padding:10px 14px;margin-bottom:10px;font-family:'Space Mono',monospace;font-size:12px;color:#ff8800;display:none;justify-content:space-between;align-items:center}
.timer-bar.active{display:flex}

/* RING */
.ring-wrap{position:relative;width:220px;height:220px;display:flex;align-items:center;justify-content:center;margin:8px 0 16px;user-select:none}
#particleCanvas{position:absolute;inset:0;border-radius:50%;pointer-events:none}
.ring-r1{position:absolute;inset:0;border-radius:50%;border:1px dashed rgba(255,23,68,0.15);animation:spin1 20s linear infinite}
.ring-r2{position:absolute;inset:14px;border-radius:50%;border:1px solid rgba(255,23,68,0.2);animation:spin2 14s linear infinite reverse}
.ring-r3{position:absolute;inset:28px;border-radius:50%;border:1.5px solid rgba(255,23,68,0.3);animation:spin1 9s linear infinite}
.ring-r3::before,.ring-r3::after{content:'';position:absolute;width:6px;height:2px;background:var(--red);border-radius:1px;top:50%;left:-3px;transform-origin:113px 1px}
.ring-r3::before{transform:rotate(0deg)}
.ring-r3::after{transform:rotate(180deg)}
.ring-core{position:absolute;inset:40px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(255,60,100,0.18),rgba(13,5,8,0.95) 65%);border:2px solid rgba(255,23,68,0.5);display:flex;align-items:center;justify-content:center;flex-direction:column;box-shadow:0 0 40px rgba(255,23,68,0.25),inset 0 0 30px rgba(255,23,68,0.1);transition:all 0.4s}
.ring-core.listening{border-color:var(--red);box-shadow:0 0 80px rgba(255,23,68,0.6),0 0 160px rgba(255,23,68,0.2),inset 0 0 40px rgba(255,23,68,0.2);animation:corePulse 0.7s ease-in-out infinite}
.ring-core.speaking{border-color:#ff8800;box-shadow:0 0 80px rgba(255,136,0,0.5),inset 0 0 30px rgba(255,136,0,0.15)}
.ring-core.thinking{border-color:var(--red2);box-shadow:0 0 60px rgba(255,69,105,0.5),inset 0 0 30px rgba(255,69,105,0.15)}
.ring-core.gesture{border-color:#00e5ff;box-shadow:0 0 80px rgba(0,229,255,0.5),inset 0 0 30px rgba(0,229,255,0.15)}
.arc-icon{font-size:38px;line-height:1}
.ring-label{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.3);margin-top:4px;text-transform:uppercase}
@keyframes spin1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spin2{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes corePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.mic-ripple{position:absolute;inset:40px;border-radius:50%;border:2px solid var(--red);pointer-events:none;display:none}
.mic-ripple.active{display:block;animation:micRipple 1.2s ease-out infinite}
@keyframes micRipple{0%{transform:scale(1);opacity:0.6}100%{transform:scale(2);opacity:0}}
.status-line{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:16px;text-align:center;min-height:20px;text-transform:uppercase;transition:color 0.3s}
.status-line.on{color:var(--red);text-shadow:0 0 12px var(--red-glow)}
.status-line.speak{color:#ff8800}
.status-line.think{color:var(--red2)}
.status-line.gesture-s{color:#00e5ff}
.wave-wrap{width:100%;height:50px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:3px}
.wave-bar{width:4px;border-radius:2px;background:var(--red);height:6px;transition:height 0.1s ease;opacity:0.6}

/* CHAT */
.chat-box{width:100%;background:rgba(255,23,68,0.04);border:1px solid var(--border);border-radius:14px;max-height:280px;overflow-y:auto;padding:14px;margin-bottom:14px;scroll-behavior:smooth}
.chat-box::-webkit-scrollbar{width:3px}
.chat-box::-webkit-scrollbar-thumb{background:rgba(255,23,68,0.3);border-radius:2px}
.msg{display:flex;gap:8px;margin-bottom:12px;animation:msgIn 0.3s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px}
.msg.jarvis .msg-avatar{background:rgba(255,23,68,0.2);border:1px solid rgba(255,23,68,0.4)}
.msg.user .msg-avatar{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15)}
.msg.user{flex-direction:row-reverse}
.msg.gmsg .msg-avatar{background:rgba(0,229,255,0.15);border:1px solid rgba(0,229,255,0.4)}
.msg-bubble{max-width:80%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.6;font-family:'Syne',sans-serif}
.msg.jarvis .msg-bubble{background:rgba(255,23,68,0.08);border:1px solid rgba(255,23,68,0.15);color:var(--white);border-top-left-radius:3px}
.msg.user .msg-bubble{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);border-top-right-radius:3px}
.msg.gmsg .msg-bubble{background:rgba(0,229,255,0.07);border:1px solid rgba(0,229,255,0.2);color:rgba(0,229,255,0.9);border-top-left-radius:3px}
.msg-time{font-size:9px;color:rgba(255,255,255,0.25);font-family:'Space Mono',monospace;margin-top:4px}
.typing-indicator{display:flex;gap:4px;padding:4px 0}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--red);opacity:0.5;animation:tb 1s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:0.5}30%{transform:translateY(-6px);opacity:1}}

/* INPUT */
.input-row{width:100%;display:flex;gap:8px;margin-bottom:14px}
.text-input{flex:1;background:rgba(255,23,68,0.06);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--white);font-family:'Syne',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s}
.text-input:focus{border-color:var(--red)}
.text-input::placeholder{color:rgba(255,255,255,0.2)}
.send-btn{width:46px;height:46px;border-radius:10px;background:var(--red);border:none;color:#000;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.send-btn:active{transform:scale(0.96)}

/* QUICK */
.quick-title{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.2);text-transform:uppercase;margin-bottom:8px;align-self:flex-start}
.quick-grid{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px}
.quick-btn{background:rgba(255,23,68,0.05);border:1px solid rgba(255,23,68,0.15);border-radius:9px;padding:9px 12px;color:rgba(255,255,255,0.6);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-align:left;transition:all 0.2s;display:flex;align-items:center;gap:7px}
.quick-btn:hover{background:rgba(255,23,68,0.12);border-color:rgba(255,23,68,0.35);color:var(--white)}
.quick-btn .qi{font-size:14px}

/* CONTROLS */
.ctrl{flex:1;padding:11px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:9px;color:rgba(255,255,255,0.5);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.ctrl:hover{background:rgba(255,23,68,0.08);border-color:rgba(255,23,68,0.2);color:var(--white)}
.ctrl.on{background:rgba(255,23,68,0.12);border-color:rgba(255,23,68,0.35);color:var(--red)}

.controls{width:100%;display:flex;gap:8px;margin-bottom:14px}

/* STATS */
.stats-row{width:100%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.stat{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 8px;text-align:center}
.stat .sv{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:var(--red)}
.stat .sl{font-size:9px;color:rgba(255,255,255,0.25);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;font-family:'Space Mono',monospace}
.voice-hint{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,0.2);text-align:center;letter-spacing:1px}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="grid-layer"></div>
<div class="scanline"></div>

<div class="app">
  <div class="topbar">
    <div class="logo">⬡ JARVIS</div>
    <div class="ver">v5.0 · CLAUDE CORE</div>
  </div>

  <!-- WAKE STATUS -->
  <div class="wake-status">
    <div class="wake-dot off" id="wakeDot"></div>
    <span id="wakeStatusText">Tap anywhere to start JARVIS</span>
  </div>

  <!-- GESTURE PANEL -->
  <div class="gesture-panel">
    <div class="gesture-header">
      <div class="gesture-title">👁 GESTURE MODE</div>
      <div class="gesture-status" id="gestureStatus">Say "Hey JARVIS enable gesture mode"</div>
    </div>
    <div class="cam-wrap" id="camWrap">
      <video id="gestureVideo" autoplay muted playsinline></video>
      <div id="gestureOverlay">Scanning...</div>
    </div>
    <div class="gesture-labels" id="gestureLabels"></div>
  </div>

  <!-- TIMER -->
  <div class="timer-bar" id="timerBar">
    <span>⏱ <span id="timerDisplay">--:--</span></span>
    <span id="timerLabel" style="color:rgba(255,136,0,0.6);font-size:10px"></span>
  </div>

  <!-- RING -->
  <div class="ring-wrap">
    <canvas id="particleCanvas" width="220" height="220"></canvas>
    <div class="mic-ripple" id="micRipple"></div>
    <div class="ring-r1"></div><div class="ring-r2"></div><div class="ring-r3"></div>
    <div class="ring-core" id="ringCore">
      <div class="arc-icon" id="arcIcon">🤖</div>
      <div class="ring-label" id="ringLabel">STANDBY</div>
    </div>
  </div>

  <div class="status-line" id="statusLine">Tap screen to activate...</div>

  <div class="wave-wrap">
    <div class="wave-bar" id="wb0"></div><div class="wave-bar" id="wb1"></div><div class="wave-bar" id="wb2"></div>
    <div class="wave-bar" id="wb3"></div><div class="wave-bar" id="wb4"></div><div class="wave-bar" id="wb5"></div>
    <div class="wave-bar" id="wb6"></div><div class="wave-bar" id="wb7"></div><div class="wave-bar" id="wb8"></div>
    <div class="wave-bar" id="wb9"></div><div class="wave-bar" id="wb10"></div><div class="wave-bar" id="wb11"></div>
    <div class="wave-bar" id="wb12"></div><div class="wave-bar" id="wb13"></div><div class="wave-bar" id="wb14"></div>
    <div class="wave-bar" id="wb15"></div>
  </div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-row">
    <input class="text-input" id="textInput" placeholder="Type a command..." onkeydown="if(event.key==='Enter')sendText()">
    <button class="send-btn" onclick="sendText()">➤</button>
  </div>

  <div class="quick-title">Quick commands</div>
  <div class="quick-grid">
    <button class="quick-btn" onclick="quickCmd('What time is it?')"><span class="qi">🕐</span> Time</button>
    <button class="quick-btn" onclick="quickCmd('Tell me a fun fact')"><span class="qi">⚡</span> Fun Fact</button>
    <button class="quick-btn" onclick="quickCmd('Set a 5 minute timer')"><span class="qi">⏱</span> Timer</button>
    <button class="quick-btn" onclick="quickCmd('Tell me a joke')"><span class="qi">😄</span> Joke</button>
    <button class="quick-btn" onclick="quickCmd('What is the weather like?')"><span class="qi">🌤</span> Weather</button>
    <button class="quick-btn" onclick="quickCmd('Give me music suggestions')"><span class="qi">🎵</span> Music</button>
    <button class="quick-btn" onclick="quickCmd('Give me a motivational quote')"><span class="qi">💪</span> Motivate</button>
    <button class="quick-btn" onclick="quickCmd('What can you do?')"><span class="qi">🛠</span> Features</button>
  </div>

  <div class="controls">
    <button class="ctrl on" id="voiceOutBtn" onclick="toggleVoiceOut()">🔊 Voice</button>
    <button class="ctrl" onclick="clearChat()">🗑 Clear</button>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="sv" id="statTurns">0</div><div class="sl">Queries</div></div>
    <div class="stat"><div class="sv" id="statWords">0</div><div class="sl">Words</div></div>
    <div class="stat"><div class="sv" id="statTime">0s</div><div class="sl">Session</div></div>
  </div>

  <div class="voice-hint">Say "Hey JARVIS" to wake up</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>

<script>
// ═══════════════════════════════════════════════
//   JARVIS AI — Powered by Claude
//   No API key needed — uses Claude API via proxy
// ═══════════════════════════════════════════════

const TM_MODEL_URL = 'https://teachablemachine.withgoogle.com/models/OSHCKVSEZ/';

let voiceOut = true;
let isListening = false, isSpeaking = false, isThinking = false;
let wakeActive = false, wakeStarted = false;
let wakeRec = null, cmdRec = null;
let synth = window.speechSynthesis;
let waveInterval = null;
let turns = 0, totalWords = 0, sessionStart = Date.now();
let history = [];
let preferredVoice = null;
let timerInterval = null;
let gestureEnabled = false, tmModel = null, camStream = null;
let gestureLoop = null, lastGestureTime = 0, gestureClasses = [];
let wakeRestartTimer = null;
let wakeActive_lockout = false;

let AC; try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}

// ── PARTICLES ──────────────────────────────────
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
const pts = [];
for(let i=0;i<40;i++) pts.push({x:110+(Math.random()-.5)*80,y:110+(Math.random()-.5)*80,r:Math.random()*1.5+.5,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,a:Math.random()*.6+.1,p:Math.random()*Math.PI*2});
(function animP(){
  pCtx.clearRect(0,0,220,220);
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.p+=.05;
    if(p.x<20||p.x>200)p.vx*=-1;if(p.y<20||p.y>200)p.vy*=-1;
    const a=p.a*(.7+.3*Math.sin(p.p));
    pCtx.beginPath();pCtx.arc(p.x,p.y,p.r*(isListening?1.8:1),0,Math.PI*2);
    pCtx.fillStyle=`rgba(255,23,68,${a*(isListening?1.5:1)})`;pCtx.fill();
  });
  requestAnimationFrame(animP);
})();

setInterval(()=>{const s=Math.floor((Date.now()-sessionStart)/1000);document.getElementById('statTime').textContent=s<60?s+'s':Math.floor(s/60)+'m';},1000);

// ── VOICES ─────────────────────────────────────
function loadVoices(){
  const v=synth.getVoices();
  // Prefer a clear, authoritative English voice
  const preferred=['Google UK English Female','Samantha','Microsoft Aria Online (Natural)','Microsoft Aria','Karen','Moira','Tessa','Victoria','Zira'];
  for(const n of preferred){
    const f=v.find(x=>x.name===n)||v.find(x=>x.name.includes(n.split(' ')[0]));
    if(f){preferredVoice=f;break;}
  }
  if(!preferredVoice){
    preferredVoice=v.find(x=>x.lang==='en-GB')||v.find(x=>x.lang.startsWith('en'))||v[0];
  }
}
if(speechSynthesis.onvoiceschanged!==undefined){speechSynthesis.onvoiceschanged=loadVoices;}
loadVoices();
setTimeout(loadVoices,500);

// ── SOUND FX ───────────────────────────────────
function beep(f=440,d=.15,t='sine',v=.25){
  if(!AC)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
  }catch(e){}
}
function sfxWake(){beep(600,.08,'sine',.2);setTimeout(()=>beep(900,.1,'sine',.25),100);setTimeout(()=>beep(1200,.12,'sine',.3),220);}
function sfxThink(){beep(600,.05,'square',.05);setTimeout(()=>beep(700,.05,'square',.05),200);setTimeout(()=>beep(800,.05,'square',.05),400);}
function sfxDone(){beep(880,.06,'sine',.15);setTimeout(()=>beep(1100,.08,'sine',.2),70);}
function sfxTimer(){beep(880,.3,'sine',.5);setTimeout(()=>beep(1100,.3,'sine',.5),350);setTimeout(()=>beep(880,.5,'sine',.5),700);}

// ── WAVEFORM ───────────────────────────────────
function startWave(mode){
  const bars=Array.from({length:16},(_,i)=>document.getElementById('wb'+i));
  clearInterval(waveInterval);
  waveInterval=setInterval(()=>{
    bars.forEach(b=>{
      if(!b)return;
      const h=mode==='speak'?Math.random()*32+4:mode==='think'?Math.sin(Date.now()/300)*8+12:Math.random()*24+4;
      b.style.height=h+'px';b.style.opacity=mode==='listen'?'0.9':'0.6';
      b.style.background=mode==='speak'?'#ff8800':mode==='think'?'#ff4569':'#ff1744';
    });
  },80);
}

// ── WAKE WORD ENGINE (Robust) ──────────────────
// Uses a continuous recognition loop with proper restart logic
// Triggers on: "hey jarvis", "jarvis", phonetic variants like "hey travis"
const WAKE_PHRASES = ['hey jarvis','hey jarvis','jarvis','hey travis','hey jarvi','a jarvis','hey service'];

function normalizeForWake(text){
  return text.toLowerCase()
    .replace(/[^\w\s]/g,'')
    .replace(/\s+/g,' ')
    .trim();
}

function isWakeWord(text){
  const n = normalizeForWake(text);
  for(const phrase of WAKE_PHRASES){
    if(n.includes(phrase)) return true;
  }
  // Fuzzy: ends with "jarvis" variant
  if(/[hj]e[iy]?\s*[jt][ar][rv][iv][si]s?$/i.test(n)) return true;
  return false;
}

function startWakeListener(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('wakeStatusText').textContent='Speech not supported on this browser';
    return;
  }

  // Prevent double-start
  if(wakeStarted && wakeRec){
    try{ wakeRec.stop(); }catch(e){}
  }

  wakeRec = new SR();
  wakeRec.lang = 'en-US';
  wakeRec.continuous = true;
  wakeRec.interimResults = true;
  wakeRec.maxAlternatives = 3;

  wakeRec.onresult = (e) => {
    if(wakeActive_lockout || wakeActive || isListening || isSpeaking || isThinking) return;

    for(let i = e.resultIndex; i < e.results.length; i++){
      // Check all alternatives
      for(let j = 0; j < e.results[i].length; j++){
        const transcript = e.results[i][j].transcript;
        if(isWakeWord(transcript)){
          wakeActive = true;
          wakeActive_lockout = true;
          onWake();
          return;
        }
      }
    }
  };

  wakeRec.onend = () => {
    wakeStarted = false;
    if(!isListening && !isSpeaking && !isThinking && !wakeActive){
      // Auto-restart after brief pause
      clearTimeout(wakeRestartTimer);
      wakeRestartTimer = setTimeout(() => {
        startWakeListener();
      }, 400);
    }
  };

  wakeRec.onerror = (e) => {
    wakeStarted = false;
    const delay = (e.error === 'no-speech') ? 200 : 1000;
    if(!isListening && !isSpeaking && !isThinking && !wakeActive){
      clearTimeout(wakeRestartTimer);
      wakeRestartTimer = setTimeout(() => {
        startWakeListener();
      }, delay);
    }
  };

  try{
    wakeRec.start();
    wakeStarted = true;
    document.getElementById('wakeDot').className = 'wake-dot';
    document.getElementById('wakeStatusText').textContent = 'Listening for "Hey JARVIS"...';
  }catch(e){
    wakeStarted = false;
    clearTimeout(wakeRestartTimer);
    wakeRestartTimer = setTimeout(startWakeListener, 1000);
  }
}

function onWake(){
  sfxWake();

  // Stop wake listener
  try{ wakeRec.stop(); }catch(e){}
  wakeStarted = false;
  clearTimeout(wakeRestartTimer);

  // Stop any ongoing speech
  synth.cancel();

  // Speak acknowledgement then start listening
  const utt = new SpeechSynthesisUtterance('Yes Boss');
  if(preferredVoice) utt.voice = preferredVoice;
  utt.rate = 1.05; utt.pitch = 1.05; utt.volume = 0.95;

  isSpeaking = true;
  setRing('speak');

  utt.onend = () => {
    isSpeaking = false;
    startCmdListen();
  };
  utt.onerror = () => {
    isSpeaking = false;
    startCmdListen();
  };

  synth.speak(utt);
}

// ── COMMAND LISTENER ───────────────────────────
function startCmdListen(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ resetWake(); return; }

  if(cmdRec){ try{ cmdRec.stop(); }catch(e){} }

  cmdRec = new SR();
  cmdRec.lang = 'en-US';
  cmdRec.continuous = false;
  cmdRec.interimResults = true;
  cmdRec.maxAlternatives = 3;
  cmdRec._finalText = '';
  cmdRec._interimText = '';
  cmdRec._hasResult = false;

  // 8-second timeout safety net
  const cmdTimeout = setTimeout(() => {
    if(isListening){
      try{ cmdRec.stop(); }catch(e){}
    }
  }, 8000);

  cmdRec.onstart = () => {
    isListening = true;
    setRing('listen');
    sfxDone();
  };

  cmdRec.onresult = (e) => {
    let finalText = '';
    let interimText = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      const t = e.results[i][0].transcript;
      if(e.results[i].isFinal) finalText += t;
      else interimText += t;
    }
    if(finalText){ cmdRec._finalText = finalText; cmdRec._hasResult = true; }
    if(interimText) cmdRec._interimText = interimText;

    const display = (finalText || interimText).trim();
    if(display) document.getElementById('statusLine').textContent = 'Heard: "' + display + '"';
  };

  cmdRec.onend = async () => {
    clearTimeout(cmdTimeout);
    isListening = false;
    document.getElementById('micRipple').className = 'mic-ripple';

    // Prefer final, fallback to interim
    const heard = (cmdRec._finalText || cmdRec._interimText).trim();

    if(heard.length > 1){
      await handleInput(heard);
    } else {
      // Nothing heard — say so and reset
      speak("I didn't catch that, Boss. Try again.");
      setTimeout(resetWake, 2500);
      return;
    }
    resetWake();
  };

  cmdRec.onerror = (e) => {
    clearTimeout(cmdTimeout);
    isListening = false;
    setRing('idle');
    if(e.error === 'no-speech'){
      speak("I didn't hear anything, Boss. Say Hey JARVIS to try again.");
    }
    setTimeout(resetWake, 2000);
  };

  try{ cmdRec.start(); }catch(e){ resetWake(); }
}

function resetWake(){
  wakeActive = false;
  setTimeout(() => {
    wakeActive_lockout = false;
    if(!isListening && !isSpeaking && !isThinking){
      startWakeListener();
    }
  }, 800);
}

async function enableGesture(){

  try{

    gestureClasses = tmModel.getClassLabels();

    ld.innerHTML = '';

      s.className = 'g-label'; s.id = 'gl' + i;
      s.textContent = cl; ld.appendChild(s);
    });

    document.getElementById('camWrap').classList.add('show');
    gs.textContent = '● ACTIVE — gestures detected'; gs.className = 'gesture-status on';
    gestureEnabled = true;
    gestureLoop = setInterval(predictGesture, 500);
    speak('Gesture mode enabled, Boss. I can see you now.');

function disableGesture(){
  gestureEnabled = false; clearInterval(gestureLoop);
  if(camStream) camStream.getTracks().forEach(t => t.stop());
  document.getElementById('camWrap').classList.remove('show');
  document.getElementById('gestureLabels').innerHTML = '';
  document.getElementById('gestureStatus').textContent = 'Say "Hey JARVIS enable gesture mode"';
  document.getElementById('gestureStatus').className = 'gesture-status';
  speak('Gesture mode disabled, Boss.');
  addMsg('gmsg', '👁 Gesture mode OFF.');
}

async function predictGesture(){
  if(!tmModel || !gestureEnabled) return;
  const v = document.getElementById('gestureVideo');
  if(v.readyState < 2) return;
  try{
    const preds = await tmModel.predict(v);
    let top = preds[0];
    preds.forEach(p => { if(p.probability > top.probability) top = p; });

    document.getElementById('gestureOverlay').textContent = top.className + ' (' + (top.probability * 100).toFixed(0) + '%)';
    gestureClasses.forEach((cl, i) => {
      const el = document.getElementById('gl' + i);
      if(el) el.className = cl === top.className ? 'g-label active' : 'g-label';
    });

    // Trigger gesture action only if confident (85%) and not too recent (3s cooldown)
    if(top.probability > 0.85 && Date.now() - lastGestureTime > 3000){
      lastGestureTime = Date.now();
      onGesture(top.className);
    }
  } catch(e){}
}

function onGesture(g){
  setRing('gesture'); beep(500, .1, 'sine', .2);
  const lc = g.toLowerCase();
  let action = '';

  if(lc.includes('thumbs up') || lc.includes('thumbs_up') || lc.includes('thumb up')){
    action = 'Give me music suggestions';
  } else if(lc.includes('thumbs down') || lc.includes('thumbs_down') || lc.includes('thumb down')){
    action = 'Tell me a joke';
  } else if(lc.includes('wave') || lc.includes('hello') || lc.includes('hi')){
    action = 'What time is it?';
  } else if(lc.includes('stop') || lc.includes('palm') || lc.includes('open hand')){
    synth.cancel(); isSpeaking = false; setRing('idle');
    addMsg('gmsg', '👁 Stop gesture — voice cancelled.'); return;
  } else if(lc.includes('peace') || lc.includes('victory') || lc.includes('two')){
    action = 'Tell me a fun fact';
  } else if(lc.includes('fist') || lc.includes('closed')){
    action = 'Set a 2 minute timer';
  } else if(lc.includes('point') || lc.includes('index') || lc.includes('one')){
    action = 'Give me a motivational quote';
  } else if(lc.includes('like') || lc.includes('ok') || lc.includes('okay')){
    action = 'What can you do?';
  } else {
    addMsg('gmsg', '👁 Gesture: ' + g); return;
  }
  addMsg('gmsg', '👁 Gesture: ' + g + ' → "' + action + '"');

}

// ── CLAUDE API ─────────────────────────────────
async function askClaude(msg){
  history.push({role:'user', content:msg});

  const sys = `You are JARVIS, a highly advanced voice AI assistant. Always address the user as "Boss". Be concise (1-3 sentences max), warm, confident, and slightly witty. 

Key rules:
- Plain speech only — no markdown, no bullet points, no asterisks, no formatting
- For timers say exactly: "Setting a 5 minute timer now, Boss."
- For music give 3 specific song/artist recommendations spoken naturally
- For weather, give a practical answer even if you can't check live data
- Be honest but helpful when you don't have real-time info
- Sound like a sophisticated AI assistant — confident, precise, a touch of personality
- Keep answers under 40 words for most responses`;

  try{
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 300,
        system: sys,
        messages: history.slice(-12)
      })
    });

    if(!r.ok){
      const e = await r.json();
      history.pop();
      // Fallback gracefully
      return localFallback(msg);
    }

    const d = await r.json();
    const reply = d.content.map(c => c.text || '').join('').trim();
    history.push({role:'assistant', content:reply});
    return reply;
  } catch(e){
    history.pop();
    return localFallback(msg);
  }
}

function localFallback(msg){
  const m = msg.toLowerCase();
  const now = new Date();

  if(m.includes('time') && !m.includes('timer')){
    return 'It is ' + now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'}) + ', Boss.';
  }
  if(m.includes('date') || m.includes('day')){
    return 'Today is ' + now.toLocaleDateString('en-IN', {weekday:'long', year:'numeric', month:'long', day:'numeric'}) + ', Boss.';
  }
  if(m.includes('joke')){
    const jokes = [
      "Why do programmers prefer dark mode? Because light attracts bugs, Boss.",
      "I told my AI to go outside. It opened a new tab, Boss.",
      "Why don't scientists trust atoms? Because they make up everything, Boss.",
      "I'm reading a book about anti-gravity. It's impossible to put down, Boss."
    ];
    return jokes[Math.floor(Math.random() * jokes.length)];
  }
  if(m.includes('fact')){
    const facts = [
      "Honey never spoils. Archaeologists have found 3000-year-old honey in Egyptian tombs that was still edible, Boss.",
      "A day on Venus is longer than a year on Venus, Boss. Quite the existential crisis.",
      "Octopuses have three hearts and blue blood, Boss. Genuinely impressive engineering.",
      "The Eiffel Tower grows about 15 cm taller in summer due to thermal expansion, Boss."
    ];
    return facts[Math.floor(Math.random() * facts.length)];
  }
  if(m.includes('motivat') || m.includes('quote')){
    const quotes = [
      "The only way to do great work is to love what you do. Steve Jobs said that, Boss, and I believe he was onto something.",
      "Success is not final, failure is not fatal — it is the courage to continue that counts, Boss.",
      "You are capable of more than you know, Boss. Now go prove it."
    ];
    return quotes[Math.floor(Math.random() * quotes.length)];
  }
  if(m.includes('music') || m.includes('song')){
    return "Try Blinding Lights by The Weeknd, Levitating by Dua Lipa, or As It Was by Harry Styles, Boss. Excellent choices for any mood.";
  }
  if(m.includes('weather')){
    return "I don't have live weather access right now, Boss. Check your weather app for the most accurate forecast in your area.";
  }
  if(m.includes('what can you do') || m.includes('features') || m.includes('help')){
    return "I can answer questions, set timers, tell jokes and facts, give music suggestions, motivational quotes, time and date — and with gesture mode I can even read your hand signals, Boss.";
  }

  return "I'm having a moment, Boss. Try rephrasing your question and I'll do my best.";
}

// ── ALEXA-STYLE BUILT-IN COMMANDS ──────────────
const GREETINGS = ['hello','hi','hey','good morning','good afternoon','good evening','howdy'];
const THANKS = ['thanks','thank you','thank you jarvis','cheers','appreciate it'];

async function handleInput(text){
  if(!text || !text.trim()) return;

  const trimmed = text.trim();
  turns++; totalWords += trimmed.split(' ').length;
  document.getElementById('statTurns').textContent = turns;
  document.getElementById('statWords').textContent = totalWords;
  addMsg('user', trimmed);

  const lc = trimmed.toLowerCase().replace(/[^\w\s]/g, '').trim();

  // ── GREETINGS ──
  if(GREETINGS.some(g => lc === g || lc.startsWith(g + ' '))){
    const h = new Date().getHours();
    const g2 = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
    const rep = g2 + ', Boss. How can I assist you today?';
    addMsg('jarvis', rep); speak(rep); return;
  }

  // ── THANKS ──
  if(THANKS.some(t => lc.includes(t))){
    const rep = "Always happy to help, Boss.";
    addMsg('jarvis', rep); speak(rep); return;
  }

  // ── GESTURE MODE ──
  if(lc.includes('enable gesture') || lc.includes('gesture mode') || lc.includes('turn on gesture') || lc.includes('open camera') || lc.includes('activate gesture')){
    if(!gestureEnabled) await enableGesture(); else speak('Gesture mode is already active, Boss.'); return;
  }
  if(lc.includes('disable gesture') || lc.includes('turn off gesture') || lc.includes('close camera') || lc.includes('deactivate gesture')){
    if(gestureEnabled) disableGesture(); else speak('Gesture mode is already off, Boss.'); return;
  }

  // ── STOP / CANCEL ──
  if(lc === 'stop' || lc.includes('stop speaking') || lc.includes('be quiet') || lc.includes('shut up') || lc.includes('pause') || lc.includes('cancel')){
    synth.cancel(); isSpeaking = false; setRing('idle'); speak('Okay, Boss.'); return;
  }

  // ── VOLUME ──
  if(lc.includes('volume up')){ speak('Please use your device volume buttons, Boss.'); return; }
  if(lc.includes('volume down')){ speak('Reducing volume isn\'t in my power directly, Boss. Try your device buttons.'); return; }

  // ── ALARMS / REMINDERS ──
  if(lc.includes('wake me up') || lc.includes('alarm')){
    const tMatch = trimmed.match(/(\d{1,2}):?(\d{2})?\s*(am|pm)?/i);
    if(tMatch){ speak('I can\'t set device alarms directly, Boss. Please use your clock app for alarms.'); return; }
  }

  // ── TIMER ──
  const timerMatch = trimmed.match(/(\d+(?:\.\d+)?)\s*(second|sec|minute|min|hour|hr)/i);
  if(timerMatch && (lc.includes('timer') || lc.includes('set') || lc.includes('remind') || lc.includes('count'))){
    let secs = parseFloat(timerMatch[1]);
    const unit = timerMatch[2].toLowerCase();
    if(unit.startsWith('min')) secs *= 60;
    if(unit.startsWith('hour') || unit.startsWith('hr')) secs *= 3600;
    const label = timerMatch[1] + ' ' + timerMatch[2];
    setTimer(secs, label);
    speak('Setting a ' + label + ' timer now, Boss.');
    addMsg('jarvis', '⏱ Timer set: ' + label); return;
  }

  // ── CANCEL TIMER ──
  if(lc.includes('cancel timer') || lc.includes('stop timer') || lc.includes('clear timer')){
    if(timerInterval){ clearInterval(timerInterval); document.getElementById('timerBar').classList.remove('active'); }
    speak('Timer cancelled, Boss.'); addMsg('jarvis', '⏱ Timer cancelled.'); return;
  }

  // ── TIME ──
  if(lc === 'what time is it' || lc === 'time' || lc.includes('what time') || lc.includes('current time')){
    const t = new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
    speak('It is ' + t + ', Boss.'); addMsg('jarvis', '🕐 ' + t); return;
  }

  // ── DATE ──
  if(lc.includes('what day') || lc.includes('what date') || lc === 'date' || lc.includes('today\'s date')){
    const d = new Date().toLocaleDateString('en-IN', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
    speak('Today is ' + d + ', Boss.'); addMsg('jarvis', '📅 ' + d); return;
  }

  // ── CLEAR CHAT ──
  if(lc.includes('clear chat') || lc.includes('clear history') || lc.includes('reset')){
    clearChat(); speak('Done, Boss. Fresh start.'); return;
  }

  // ── MUTE/UNMUTE ──
  if(lc === 'mute' || lc.includes('turn off voice') || lc.includes('silent mode')){
    voiceOut = false; updateVoiceBtn(); addMsg('jarvis', '🔇 Voice output muted.'); return;
  }
  if(lc === 'unmute' || lc.includes('turn on voice') || lc.includes('voice on')){
    voiceOut = true; updateVoiceBtn(); speak('Voice is back on, Boss.'); return;
  }

  // ── AI for everything else ──
  setRing('think'); isThinking = true; sfxThink(); showTyping();
  try{
    const reply = await askClaude(trimmed);
    removeTyping(); isThinking = false;
    addMsg('jarvis', reply);
    speak(reply);
  } catch(e){
    removeTyping(); isThinking = false;
    const err = 'Something went wrong, Boss. Please try again.';
    addMsg('jarvis', err); speak(err);
  }
}

// ── SPEAK ──────────────────────────────────────
function speak(text){
  if(!voiceOut || !synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if(preferredVoice) u.voice = preferredVoice;
  u.rate = 0.97; u.pitch = 1.05; u.volume = 0.95;
  u.onstart = () => { isSpeaking = true; setRing('speak'); };
  u.onend = () => {
    isSpeaking = false; setRing('idle');
    // Restart wake listener after speaking if not listening
    if(!isListening && !wakeStarted){
      clearTimeout(wakeRestartTimer);
      wakeRestartTimer = setTimeout(() => {
        wakeActive_lockout = false;
        wakeActive = false;
        startWakeListener();
      }, 500);
    }
  };
  u.onerror = () => { isSpeaking = false; setRing('idle'); };
  synth.speak(u);
}

function updateVoiceBtn(){
  const b = document.getElementById('voiceOutBtn');
  b.textContent = (voiceOut ? '🔊' : '🔇') + ' Voice';
  b.className = 'ctrl' + (voiceOut ? ' on' : '');
}

function toggleVoiceOut(){
  voiceOut = !voiceOut;
  updateVoiceBtn();
  if(!voiceOut) synth.cancel();
}

// ── INIT ───────────────────────────────────────
function boot(){
  if(AC && AC.state === 'suspended') AC.resume();
  if(!wakeStarted) startWakeListener();
}

document.addEventListener('click', boot, {once:true});
document.addEventListener('touchstart', boot, {once:true});

window.addEventListener('load', () => {
  const h = new Date().getHours();
  const g = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  addMsg('jarvis', 'Good ' + g + ', Boss. Tap anywhere once to activate, then say "Hey JARVIS" anytime to wake me. For hands-free control, say "Hey JARVIS enable gesture mode".');
});
</script>
